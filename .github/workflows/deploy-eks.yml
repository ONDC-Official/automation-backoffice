name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set repository name to lowercase
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-increment patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          current_version=$(cat version.txt)
          IFS='.' read -r major minor patch <<< "$current_version"
          patch=$((patch + 1))
          next_version="$major.$minor.$patch"
          echo "Next version: $next_version"
          echo "$next_version" > version.txt
          echo "VERSION=$next_version" >> $GITHUB_ENV
          git add version.txt
          git commit -m "ci: auto-increment version to $next_version [skip ci]"
          git push

      - name: Determine environment and image tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENVIRONMENT=prod"                                        >> $GITHUB_ENV
            echo "IMAGE_TAG=prod-${{ env.VERSION }}"                      >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values-prod.yaml" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev"                                         >> $GITHUB_ENV
            echo "IMAGE_TAG=dev-${{ env.VERSION }}"                       >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values.yaml"      >> $GITHUB_ENV
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-backend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}-backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}-backend:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}-backend:cache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.REPO_LOWER }}-frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}-frontend:cache
          cache-to: type=registry,ref=ghcr.io/${{ env.REPO_LOWER }}-frontend:cache,mode=max

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: automation-iac

      - name: Clone automation-iac repo
        uses: actions/checkout@v4
        with:
          repository: ONDC-Official/automation-iac
          token: ${{ steps.app-token.outputs.token }}
          path: automation-iac

      - name: Update image tags in Helm values
        run: |
          python3 << 'PYEOF'
          import re, os

          target    = f"automation-iac/{os.environ['TARGET_FILE']}"
          image_tag = os.environ['IMAGE_TAG']

          tracked_sections = {'backofficeBackend', 'backofficeFrontend'}

          with open(target, 'r') as f:
              lines = f.readlines()

          current_section = None
          result = []
          for line in lines:
              top_level = re.match(r'^([a-zA-Z]\S*):', line)
              if top_level:
                  key = top_level.group(1)
                  current_section = key if key in tracked_sections else None
              if current_section and re.match(r'^\s+tag:\s', line):
                  line = re.sub(r'(tag:\s).*', rf'\g<1>{image_tag}', line)
              result.append(line)

          with open(target, 'w') as f:
              f.writelines(result)
          PYEOF
        env:
          TARGET_FILE: ${{ env.TARGET_FILE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push tag update to IaC repo
        run: |
          cd automation-iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.TARGET_FILE }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update backoffice image tags to ${{ env.IMAGE_TAG }} (${{ env.ENVIRONMENT }})"
          git push
