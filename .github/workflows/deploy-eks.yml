name: Build and Deploy to EKS

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set repository name to lowercase
        run: echo "REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read semver version from package.json
        run: |
          set -e
          for p in package.json backend/package.json frontend/package.json; do
            if [ -f "$p" ]; then
              VERSION=$(node -p "require('./$p').version")
              echo "Found version in $p: $VERSION"
              echo "VERSION=$VERSION" >> $GITHUB_ENV
              echo "VERSION_SOURCE=$p" >> $GITHUB_ENV
              break
            fi
          done
          if [ -z "${VERSION:-}" ]; then
            echo "No package.json found to read version" >&2
            exit 1
          fi

      - name: Compute short SHA and environment image tag
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENVIRONMENT=prod"                                        >> $GITHUB_ENV
            echo "IMAGE_TAG=prod-${{ env.VERSION }}-${SHORT_SHA}"         >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values-prod.yaml" >> $GITHUB_ENV
          else
            echo "ENVIRONMENT=dev"                                         >> $GITHUB_ENV
            echo "IMAGE_TAG=dev-${{ env.VERSION }}-${SHORT_SHA}"          >> $GITHUB_ENV
            echo "TARGET_FILE=k8/aws/helm/service-layer/values.yaml"      >> $GITHUB_ENV
          fi

      - name: Generate OCI metadata for backend image
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LOWER }}-backend:${{ env.IMAGE_TAG }}

      - name: Build and push backend image (semver tag)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-backend:${{ env.IMAGE_TAG }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push backend latest tag (main only)
        if: ${{ github.ref_name == 'main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}-backend:latest
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate OCI metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO_LOWER }}-frontend:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image (semver tag)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}-frontend:${{ env.IMAGE_TAG }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend latest tag (main only)
        if: ${{ github.ref_name == 'main' }}
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}-frontend:latest
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: automation-iac

      - name: Clone automation-iac repo
        uses: actions/checkout@v4
        with:
          repository: ONDC-Official/automation-iac
          token: ${{ steps.app-token.outputs.token }}
          path: automation-iac

      - name: Update  image tags in Helm values
        run: |
          python3 << 'PYEOF'
          import re, os

          target    = f"automation-iac/{os.environ['TARGET_FILE']}"
          image_tag = os.environ['IMAGE_TAG']

          tracked_sections = {'backofficeBackend', 'backofficeFrontend'}

          with open(target, 'r') as f:
              lines = f.readlines()

          current_section = None
          result = []
          for line in lines:
              top_level = re.match(r'^([a-zA-Z]\S*):', line)
              if top_level:
                  key = top_level.group(1)
                  current_section = key if key in tracked_sections else None
              if current_section and re.match(r'^\s+tag:\s', line):
                  line = re.sub(r'(tag:\s).*', rf'\g<1>{image_tag}', line)
              result.append(line)

          with open(target, 'w') as f:
              f.writelines(result)
          PYEOF
        env:
          TARGET_FILE: ${{ env.TARGET_FILE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push tag update to IaC repo
        run: |
          cd automation-iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.TARGET_FILE }}"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update backoffice image tags to ${{ env.IMAGE_TAG }} (${{ env.ENVIRONMENT }})"
          git push
