name: Build and Deploy to EKS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - draft-*
      - release-staging
      - release-*

permissions:
  packages: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      image_tag:   ${{ steps.set.outputs.image_tag }}
      environment: ${{ steps.set.outputs.environment }}
      target_file: ${{ steps.set.outputs.target_file }}
      version:     ${{ steps.set.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and build image tag
        id: set
        run: |
          VERSION=$(node -p "require('./backend/package.json').version")
          SHORT_SHA=$(git rev-parse --short=7 HEAD)

          if [[ "${{ github.ref_name }}" == release-* ]]; then
            ENV=staging
            TARGET="k8/aws/helm/service-layer/values-staging.yaml"
          else
            ENV=dev
            TARGET="k8/aws/helm/service-layer/values.yaml"
          fi

          IMAGE_TAG="${ENV}-${VERSION}-${SHORT_SHA}"

          echo "version=${VERSION}"      >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}"  >> $GITHUB_OUTPUT
          echo "environment=${ENV}"      >> $GITHUB_OUTPUT
          echo "target_file=${TARGET}"   >> $GITHUB_OUTPUT

  build-backend:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set backend image metadata
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ondc-official/automation-backoffice-backend
          tags: ${{ needs.version.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    needs: version
    runs-on: ubuntu-latest
    environment: ${{ needs.version.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set frontend image metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ondc-official/automation-backoffice-frontend
          tags: ${{ needs.version.outputs.image_tag }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  update-iac:
    needs: [version, build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: automation-iac

      - name: Clone automation-iac repo
        uses: actions/checkout@v4
        with:
          repository: ONDC-Official/automation-iac
          token: ${{ steps.app-token.outputs.token }}
          path: automation-iac

      - name: Update backoffice image tags in Helm values
        run: |
          python3 << 'PYEOF'
          import re, os

          target = f"automation-iac/{os.environ['TARGET_FILE']}"
          image_tag = os.environ['IMAGE_TAG']

          with open(target, 'r') as f:
              lines = f.readlines()

          current_section = None
          result = []
          for line in lines:
              if re.match(r'^[a-zA-Z]', line):
                  current_section = line.strip().rstrip(':').split(':')[0]
              if current_section in ('backofficeBackend', 'backofficeFrontend') and re.match(r'^\s+tag:\s', line):
                  line = re.sub(r'(tag:\s*).*', rf'\g<1>{image_tag}', line)
              result.append(line)

          with open(target, 'w') as f:
              f.writelines(result)

          print(f"Updated backofficeBackend and backofficeFrontend image tags to: {image_tag}")
          PYEOF
        env:
          TARGET_FILE: ${{ needs.version.outputs.target_file }}
          IMAGE_TAG:   ${{ needs.version.outputs.image_tag }}

      - name: Commit and push tag update to IaC repo
        run: |
          cd automation-iac
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ needs.version.outputs.target_file }}"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update automation-backoffice image tags to ${{ needs.version.outputs.image_tag }} (${{ needs.version.outputs.environment }})"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              sleep $((i * 5))
            done
          fi
